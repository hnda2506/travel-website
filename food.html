<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ẩm thực Việt Nam</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  min-height:100vh;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
  font-size:28px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* CONTENT */
.content{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:80px 20px;
  flex-wrap:wrap;
}

/* CARD */
.card{
  width:300px;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  transition:0.4s;
  position:relative;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  opacity:0;
  transition:0.4s;
}

.card:hover::before{opacity:1}

.card:hover{
  transform:translateY(-15px) scale(1.05);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.5s;
}

.card:hover img{
  transform:scale(1.1);
  filter:brightness(0.8);
}

.card h3{
  padding:20px;
  font-size:22px;
  text-align:center;
  letter-spacing:1px;
}

/* ANIMATION */
.card{
  opacity:0;
  transform:translateY(60px);
}

</style>
</head>

<body>

<header><h1>🍜 Ẩm thực Việt Nam</h1></header>

<section class="content">

<a class="card" href="pho.html">
<img src="https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?auto=format&fit=crop&w=800&q=60">
<h3>Phở</h3>
</a>

<a class="card" href="banhmi.html">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc500f?auto=format&fit=crop&w=800&q=60">
<h3>Bánh mì</h3>
</a>

</section>

<script>
// SCROLL EFFECT
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll',()=>{
  cards.forEach(card=>{
    const top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.style.opacity=1;
      card.style.transform='translateY(0)';
    }
  });
});

// LOAD EFFECT
window.onload = ()=>{
  setTimeout(()=>{
    cards.forEach((card,i)=>{
      setTimeout(()=>{
        card.style.opacity=1;
        card.style.transform='translateY(0)';
      },i*200);
    });
  },300);
};
</script>

</body>
</html>
