
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THPT Thái Hòa</title>

<!-- FONT (load nhanh) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* NAV */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0;
height:2px;
background:#00e5ff;
left:0;
bottom:-5px;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* HERO */
.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.5),rgba(0,0,0,0.9));
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

.hero-text h1{
font-size:70px;
}

.hero-text p{
margin-top:10px;
font-size:20px;
opacity:0.9;
}

/* SECTION */
section{
padding:100px 40px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
}

/* CARD */
.card{
margin-top:40px;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
padding:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#020617;
}
</style>
</head>

<body>

<header>
<h2>THPT Thái Hòa</h2>
<nav>
<a href="#">Trang chủ</a>
<a href="#">Giới thiệu</a>
<a href="#">Hoạt động</a>
<a href="#">Liên hệ</a>
</nav>
</header>

<!-- HERO -->
<div class="hero">

<img src="images/thpt-thai-hoa.jpg" class="hero-img">

<div class="overlay"></div>

<div class="hero-text">
<h1>Trường THPT Thái Hòa</h1>
<p>Nơi chắp cánh ước mơ</p>
</div>

</div>

<!-- CONTENT -->
<section>
<div class="container">

<h2>Giới thiệu</h2>
<p>
Trường THPT Thái Hòa là môi trường học tập năng động, nơi học sinh phát triển toàn diện
về tri thức, kỹ năng và nhân cách.
</p>

<div class="card">
<img src="images/thpt-thai-hoa.jpg">
<h3>Khuôn viên trường</h3>
</div>

</div>
</section>

<footer>
<p>© 2026 THPT Thái Hòa</p>
</footer>

</body>
</html>
```
