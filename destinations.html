<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm đến - Max Travel UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* CURSOR GLOW */
.cursor{
  width:25px;height:25px;border:2px solid #00e5ff;border-radius:50%;
  position:fixed;pointer-events:none;z-index:9999;transition:0.08s;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;
  display:flex;justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  z-index:1000
}
nav a{color:white;text-decoration:none;margin:0 15px}

/* HERO VIDEO */
.hero{height:100vh;position:relative;overflow:hidden}
.hero video{position:absolute;width:100%;height:100%;object-fit:cover}
.hero .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5)}
.hero .content{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center
}
.hero h1{font-size:70px;animation:fadeUp 1.2s}
.hero p{opacity:0.8;margin-top:10px}

@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

section{padding:100px 40px}
.container{max-width:1200px;margin:auto}

/* CARDS GRID */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px
}

.card{
  position:relative;
  border-radius:25px;
  overflow:hidden;
  text-decoration:none;color:white;
  transform-style:preserve-3d;
  transition:0.4s;
}

.card img{
  width:100%;height:260px;object-fit:cover;
  transition:0.5s
}

.card .info{
  position:absolute;bottom:0;width:100%;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
  padding:20px
}

.card:hover img{transform:scale(1.15)}
.card:hover{transform:rotateX(5deg) rotateY(-5deg) scale(1.05)}

/* MAP REAL */
.map iframe{
  width:100%;height:400px;border:none;border-radius:20px
}

/* CTA */
.cta{
  text-align:center;
  background:linear-gradient(45deg,#00e5ff,#00bcd4);
  padding:60px;border-radius:20px
}
.cta button{
  padding:15px 30px;border:none;border-radius:30px;
  background:white;color:#00bcd4;font-weight:bold;cursor:pointer
}

footer{text-align:center;padding:20px;background:#020617;margin-top:50px}
</style>
</head>
<body>

<div class="cursor"></div>

<nav>
<h2>TRAVEL VN</h2>
<div>
<a href="#places">Địa điểm</a>
<a href="#map">Bản đồ</a>
</div>
</nav>

<div class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-beach-1561/1080p.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="content">
<h1>Khám phá Việt Nam</h1>
<p>Trải nghiệm du lịch đỉnh cao</p>
</div>
</div>

<section id="places">
<div class="container">
<h2 style="text-align:center;margin-bottom:50px">Điểm đến nổi bật</h2>

<div class="cards">

<a class="card" href="hanoi.html">
<img src="https://images.unsplash.com/photo-1528127269322-539801943592">
<div class="info"><h3>Hà Nội</h3></div>
</a>

<a class="card" href="danang.html">
<img src="https://images.unsplash.com/photo-1583417319070-4a69db38a482">
<div class="info"><h3>Đà Nẵng</h3></div>
</a>

<a class="card" href="phuquoc.html">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="info"><h3>Phú Quốc</h3></div>
</a>

</div>
</div>
</section>

<section id="map">
<div class="container">
<h2 style="text-align:center;margin-bottom:40px">Bản đồ du lịch</h2>
<div class="map">
<iframe src="https://maps.google.com/maps?q=Vietnam&t=&z=5&ie=UTF8&iwloc=&output=embed"></iframe>
</div>
</div>
</section>

<section>
<div class="container">
<div class="cta">
<h2>Bắt đầu hành trình ngay</h2>
<button>Explore</button>
</div>
</div>
</section>

<footer>
<p>© 2026 Travel VN</p>
</footer>

<script>
// CURSOR
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
cursor.style.top=e.clientY+'px';
cursor.style.left=e.clientX+'px';
});

// SCROLL ANIMATION
const cards=document.querySelectorAll('.card');
cards.forEach(c=>{c.style.opacity=0;c.style.transform='translateY(60px)'});
window.addEventListener('scroll',()=>{
cards.forEach(card=>{
if(card.getBoundingClientRect().top<window.innerHeight-50){
card.style.opacity=1;card.style.transform='translateY(0)'
}
});
});
</script>

</body>
</html>
